name: Deploy Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false  # Don't clone submodules for Pages

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build docs
        run: |
          # Build your docs here (e.g., if using MkDocs, Sphinx, etc.)
          echo "Building docs..."

      - name: Delete old artifacts
        uses: gha-remove-artifacts@v2
        with:
          age: '0 seconds'  # Delete all previous artifacts

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'  # Path to your docs folder

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
