name: Deploy static content to Pages

on:
  push:
    branches: ["main"] # Replace with your default branch

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # By default, this DOES NOT fetch submodules.
          # This solves your LuaJIT error.
          submodules: false 

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Point this to the folder you want to serve (e.g., 'dist' or 'docs')
          path: 'docs'

      - name: Deploy to GitHub Actions
        id: deployment
        uses: actions/deploy-pages@v4
