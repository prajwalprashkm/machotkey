<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macro Script Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #1e1e1e;
            --bg-secondary: #252526;
            --bg-tertiary: #2d2d30;
            --border-color: #3e3e42;
            --text-primary: #cccccc;
            --text-secondary: #858585;
            --accent: #007acc;
            --accent-hover: #1c97ea;
            --success: #4ec9b0;
            --error: #f48771;
            --warning: #dcdcaa;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Toolbar */
       
        /* 3. Ensure the toolbar doesn't force a minimum width */
        .toolbar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            min-width: 0;
            overflow: hidden; /* Keeps buttons from popping out */
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toolbar-divider {
            width: 1px;
            height: 24px;
            background: var(--border-color);
            margin: 0 4px;
        }

        button {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        button:hover {
            background: var(--bg-primary);
            border-color: var(--accent);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            font-weight: 500;
        }

        button.primary:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
        }

        button.icon-only {
            padding: 6px 8px;
            min-width: 32px;
            justify-content: center;
        }

        .file-input {
            display: none;
        }

        .file-name {
            color: var(--text-secondary);
            font-size: 13px;
            padding: 0 8px;
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

                /* 1. Allow the main container to shrink in both directions */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
            min-width: 0;
            min-height: 0;
        }

        /* 2. Allow the editor container to shrink horizontally */
        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            min-width: 0; 
        }

        #editor {
            flex: 1;
            width: 100%;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            min-width: 200px;
            max-width: 600px;
        }

        .resize-handle {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 5px;
            cursor: ew-resize;
            background: transparent;
            z-index: 10;
        }

        .resize-handle:hover,
        .resize-handle.resizing {
            background: var(--accent);
        }

        .sidebar-tabs {
            display: flex;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-tab {
            flex: 1;
            padding: 10px 16px;
            background: transparent;
            border: none;
            border-radius: 0;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }

        .sidebar-tab.active {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-bottom: 2px solid var(--accent);
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        /* Status Panel */
        .status-section {
            display: none;
        }

        .status-section.active {
            display: block;
        }

        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .status-header h3 {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .clear-btn {
            padding: 4px 10px;
            font-size: 11px;
        }

        .status-output {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 12px;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 12px;
            line-height: 1.5;
        }

        .status-line {
            margin-bottom: 4px;
            word-wrap: break-word;
        }

        .status-line.info {
            color: var(--text-primary);
        }

        .status-line.success {
            color: var(--success);
        }

        .status-line.error {
            color: var(--error);
        }

        .status-line.warning {
            color: var(--warning);
        }

        .status-line .timestamp {
            color: var(--text-secondary);
            margin-right: 8px;
        }

        /* Settings Panel */
        .settings-section {
            display: none;
        }

        .settings-section.active {
            display: block;
        }

        .setting-group {
            margin-bottom: 20px;
        }

        .setting-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .setting-group input[type="text"],
        .setting-group input[type="number"],
        .setting-group select {
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 13px;
        }

        .setting-group input:focus,
        .setting-group select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            text-transform: none;
            letter-spacing: normal;
            color: var(--text-primary);
        }

        /* Spinner */
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid var(--border-color);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #4e4e50;
        }

        /* Status indicator */
        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .status-indicator.ready {
            background: var(--success);
        }

        .status-indicator.running {
            background: var(--accent);
            animation: pulse 1.5s ease-in-out infinite;
        }

        .status-indicator.error {
            background: var(--error);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .fontawesome-icon {
            color: white;
        }
    </style>
  <script type="module" crossorigin src="/project/src/ui-dist/assets/main-_duUl1SG.js"></script>
  <link rel="stylesheet" crossorigin href="/project/src/ui-dist/assets/main-DJrX5RU-.css">
</head>
<body>
    <!-- Toolbar -->
    <div class="toolbar">
        <div class="toolbar-group">
            <input type="file" id="fileInput" class="file-input" accept=".lua,.txt,.js">
            <button id="openBtn" title="Open File">
                <span class="fa-solid fa-file fontawesome-icon"></span>
                <span>Open</span>
            </button>
            <button id="saveBtn" title="Save File">
                <span class="fa-solid fa-floppy-disk fontawesome-icon"></span>
                <span>Save</span>
            </button>
        </div>
        
        <div class="toolbar-divider"></div>
        
        <div class="toolbar-group">
            <button id="runBtn" class="primary" title="Run Script (Cmd+Enter)">
                <span class="fa-solid fa-play fontawesome-icon"></span>
                <span>Run</span>
            </button>
            <button id="stopBtn" disabled title="Stop Script">
                <span class="fa-solid fa-stop fontawesome-icon"></span>
                <span>Stop</span>
            </button>
        </div>
        
        <div class="toolbar-divider"></div>
        
        <span class="file-name" id="fileName">No file loaded</span>
        
        <div style="flex: 1"></div>
        
        <div class="toolbar-group">
            <span class="status-indicator ready" id="statusIndicator"></span>
            <span id="statusText" style="font-size: 12px; color: var(--text-secondary);">Ready</span>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Editor -->
        <div class="editor-container">
            <div id="editor"></div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="resize-handle" id="resizeHandle"></div>
            <div class="sidebar-tabs">
                <button class="sidebar-tab active" data-tab="status">Console</button>
                <button class="sidebar-tab" data-tab="settings">Settings</button>
            </div>
            
            <div class="sidebar-content">
                <!-- Status Panel -->
                <div class="status-section active" id="statusPanel">
                    <div class="status-header">
                        <h3>Output</h3>
                        <button class="clear-btn" id="clearBtn">Clear</button>
                    </div>
                    <div class="status-output" id="statusOutput">
                        <div class="status-line info">
                            <span class="timestamp">[Ready]</span>
                            <span>Waiting for script execution...</span>
                        </div>
                    </div>
                </div>

                <!-- Settings Panel -->
                <div class="settings-section" id="settingsPanel">
                    <div class="setting-group">
                        <label>Editor Theme</label>
                        <select id="themeSelect">
                            <option value="Default Dark Modern" selected>Dark (Default)</option>
                            <option value="Visual Studio Light">Light</option>
                            <option value="Default High Contrast">High Contrast</option>
                        </select>
                    </div>
                    
                    <div class="setting-group">
                        <label>Font Size</label>
                        <input type="number" id="fontSizeInput" value="14" min="10" max="24">
                    </div>
                    
                    <div class="setting-group">
                        <label>Tab Size</label>
                        <input type="number" id="tabSizeInput" value="4" min="2" max="8">
                    </div>
                    
                    <div class="setting-group checkbox-group">
                        <input type="checkbox" id="autoSaveCheck">
                        <label for="autoSaveCheck">Auto-save on run</label>
                    </div>
                    
                    <div class="setting-group checkbox-group">
                        <input type="checkbox" id="lineNumbersCheck" checked>
                        <label for="lineNumbersCheck">Show line numbers</label>
                    </div>
                    
                    <div class="setting-group checkbox-group">
                        <input type="checkbox" id="miniMapCheck" checked>
                        <label for="miniMapCheck">Show minimap</label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://kit.fontawesome.com/6f2c70436b.js" crossorigin="anonymous"></script>
</body>
</html>
