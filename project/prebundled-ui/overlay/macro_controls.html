<!DOCTYPE html>
<html>
<head>
    <style>
        :root {
            --bg-gray: rgba(30, 30, 32, 0.88); 
            /* Added a high-contrast white/cyan 'sparkle' into the gradient for more pop */
            --border-gradient: linear-gradient(90deg, 
                #007affaa, #5ac8faaa, #ccccccaa, #00c7beaa, #ff2d55aa, #007affaa);
        }
        

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            pointer-events: none; /* Allow clicks to pass through when needed */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI"; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
        }

        .no-hover {
            transform: rotate(0deg) scale(1) !important;
            transition: none !important;
        }
        .taskbar {
            pointer-events: auto;
            
            position: relative;
            display: flex;
            align-items: center;
            height: 48px;
            padding: 0 16px;
            gap: 12px;
            color: white;
            border: 2.5px solid transparent; 
            border-radius: 16px;

            /* Layered background: Gray on top, Moving Gradient on bottom */
            background: 
                linear-gradient(var(--bg-gray), var(--bg-gray)) padding-box, 
                var(--border-gradient) border-box;
            
            background-size: 100% 100%, 300% 100%;
            
            /* DYNAMIC ANIMATION: 
               Uses a custom bezier for "speed ramping" and "snapping" effect */
            animation: dynamicBorder 8s cubic-bezier(0.65, 0, 0.35, 1) alternate infinite;

            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
        }

        /* DYNAMIC KEYFRAMES:
           0-30%: Fast snap and slide
           30-50%: Slow crawl (the "processing" look)
           50-70%: Complete pause/hold
           70-100%: Quick reset/vibration
        */
        @keyframes dynamicBorder {
            0% { background-position: 0 0, 0% 0%; }
            30% { background-position: 0 0, 70% 0%; }
            50% { background-position: 0 0, 75% 0%; } /* Very slow crawl */
            70% { background-position: 0 0, 75% 0%; } /* Hard pause */
            85% { background-position: 0 0, 95% 0%; } /* Fast snap */
            100% { background-position: 0 0, 100% 0%; }
        }

        /* Subtle Glow Pulse */
        .taskbar::after {
            content: "";
            position: absolute;
            inset: -3px;
            z-index: -2;
            background: var(--border-gradient);
            background-size: 300% 100%;
            filter: blur(8px);
            opacity: 0.3;
            border-radius: 18px;
            animation: dynamicGlow 12s cubic-bezier(0.65, 0, 0.35, 1) alternate infinite;
        }

        @keyframes dynamicGlow {
            0% { background-position: 0% 0%; opacity: 0.3; }
            30% { background-position: 70% 0%; opacity: 0.5; }
            70% { background-position: 75% 0%; opacity: 0.2; } /* Dim during pause */
            100% { background-position: 100% 0%; opacity: 0.3; }
        }

        .drag-region {
            -webkit-app-region: drag;
            font-size: 10px;
            font-weight: 900;
            opacity: 0.7;
            letter-spacing: 2px;
            background: linear-gradient(to bottom, #fff, #999);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            /* Forces text to stay on a single line regardless of container width */
            white-space: nowrap; 
            
            /* Optional: If the name is truly too long, it will add "..." instead of wrapping */
            overflow: hidden;
            text-overflow: ellipsis;
            
            /* Ensure the width is determined by the content */
            width: auto;
            display: inline-block;
        }

        .controls {
            display: flex;
            gap: 10px;
            -webkit-app-region: no-drag;
        }

        .icon-btn {
            width: 34px;
            height: 34px;
            border-radius: 9px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.08);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /*.icon-btn.is-hovered {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.4);
            transform: scale(1.1) rotate(2deg);
        }*/

        .icon-btn:active { transform: rotate(2deg) scale(0.95) !important; }

        .icon-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .start-svg { fill: #32d74b; filter: drop-shadow(0 0 8px rgba(50, 215, 75, 0.6)); }
        .pause-svg { 
            fill: #ffffff; /* macOS Gold/Amber */
            filter: drop-shadow(0 0 8px rgba(255, 204, 0, 0.6)); 
        }
        .stop-svg { fill: #ff453a; filter: drop-shadow(0 0 8px rgba(255, 69, 58, 0.6)); }

        .divider {
            width: 1px;
            height: 20px;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.3), transparent);
        }
    </style>
  <script type="module" crossorigin src="./assets/macro_controls.js"></script>
</head>
<body>
    <div class="taskbar">
        <div class="drag-region">No macro running</div>
        <div class="divider"></div>
        <div class="controls">
            <button class="icon-btn">
                <svg viewBox="0 0 24 24" width="20" height="20"><path class="start-svg" d="M8 5v14l11-7z"/></svg>
            </button>
            <button class="icon-btn" onclick="window.callCpp('pause', '')" title="Pause Macro">
                <svg viewBox="0 0 24 24" width="18" height="18">
                    <path class="pause-svg" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                </svg>
            </button>
            <button class="icon-btn">
                <svg viewBox="0 0 24 24" width="18" height="18"><path class="stop-svg" d="M6 6h12v12H6z"/></svg>
            </button>
        </div>
    </div>
</body>
</html>
